name: Live Secretary Automation

on:
  schedule:
    # 9:45 AM HKT is 01:45 UTC
    - cron: '45 1 * * 1-5'
    # 10:00 AM HKT is 02:00 UTC
    - cron: '0 2 * * 1-5'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  run-secretary:
    runs-on: ubuntu-latest
    timeout-minutes: 150 # Failsafe timeout since max run is 120 mins

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Appropriate Script Based on Time
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CURRENT_MIN=$(date -u +"%M")
          # If triggered near 01:45 UTC
          if [ "$CURRENT_MIN" -ge 40 ] && [ "$CURRENT_MIN" -le 55 ]; then
            echo "Running Preflight Check..."
            python preflight_check.py
          else
            echo "Running Live Secretary..."
            # On GitHub Ubuntu, ffmpeg is in PATH, so we must make sure the script uses 'ffmpeg' 
            # instead of './ffmpeg' which is hardcoded in the script.
            # We will use sed to patch it on the fly for the cloud environment.
            sed -i 's/"\.\/ffmpeg"/"ffmpeg"/g' live_secretary.py
            python live_secretary.py
          fi
